name: Site Tests

on:
  push:
    paths:
      - 'docs/smartfilter/**'
      - 'tests/**'
      - '.github/workflows/site-tests.yml'
  pull_request:
    paths:
      - 'docs/smartfilter/**'
      - 'tests/**'
      - '.github/workflows/site-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Run site tests
        run: python3 -m unittest discover -s tests -v
